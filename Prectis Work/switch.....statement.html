<html>
<head>
<script language="JavaScript" type="text/JavaScript">
	var book = prompt("Enter a book name : ");
	switch (book)
	{
		case "net":
			document.write("select Nerworking Enviornment");
			break;
		case "cl":
			document.write("select Computer Language");
			break;
		case "cs":
			document.write("select Technical Communication Skil");
			break;
		case "cf":
			document.write("select Computer Fundamental");
			break;
		default:
			document.write("select unkonwn book");
			break;
	}
</script>
</head>
</html>
